# =============================================================================
# IT Project Tracker — Configuration nginx
# Reverse proxy HTTPS avec redirection HTTP → HTTPS
# =============================================================================

# ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    return 301 https://$host$request_uri;
}

# ─── HTTPS + Reverse proxy ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # Certificat auto-signé
    ssl_certificate     /etc/ssl/certs/tracker.crt;
    ssl_certificate_key /etc/ssl/private/tracker.key;

    # Protocoles et chiffrement
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # En-têtes transmis à Node.js
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Taille max des uploads (commentaires, pièces jointes éventuelles)
    client_max_body_size 10M;

    # ─── SSE (Server-Sent Events) — connexions longue durée ─────────────────
    # Route /api/sse : ne pas bufferiser, timeout étendu
    location /api/sse {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Connection '';
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  24h;
        chunked_transfer_encoding on;
    }

    # ─── API + Application React ─────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }
}
